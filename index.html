<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Root Network / Invisible Presence</title>
    <link rel="stylesheet" href="style.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
        }
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.11.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.11.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.11.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-landmarks-detection@1.0.2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/hand-pose-detection@2.0.0"></script>
  </head>
  <body>
    <div id="ui">
      <div class="hud">
        <div class="title">Root Network / Invisible Presence</div>
        <div>Move slowly to open the network.</div>
        <div class="meta">Fast motion disturbs the field. Stillness thickens memory.</div>
      </div>
      <div class="corner">
        <strong>OrbitControls</strong> rotate / zoom / pan<br />
        click to start webcam + audio<br />
        movement and gestures reshape memory links
      </div>
      <div id="stats">awaiting webcam permission</div>
      <div id="startHint">click to initiate system</div>
      <div class="gui-wrap" id="gui-wrap"></div>
      <div class="glitch"></div>
    </div>

    <script src="script.js" type="module"></script>
  </body>
</html>
